name: Linux build
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # python-version: [ "3.10", "3.11", "3.12" ]
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Smoke test latest PyPI release
        run: |
          pip install -U agentica
          cd "$RUNNER_TEMP"
          python -c "import agentica; print(agentica.__version__, agentica.__file__)"
          pip uninstall -y agentica

      - name: Verify current wheel
        run: |
          pip install build
          python -m build --wheel
          export WHEEL_PATH=$(python -c "from pathlib import Path; wheels=list(Path('dist').glob('agentica-*.whl')); assert len(wheels) == 1, wheels; print(wheels[0])")
          pip install "$WHEEL_PATH"
          export EXPECTED_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          cd "$RUNNER_TEMP"
          python -c "import os, agentica; from importlib.metadata import requires; from PIL import Image; deps=requires('agentica') or []; assert agentica.__version__ == os.environ['EXPECTED_VERSION']; assert any(dep.lower().startswith('pillow>=10.0') for dep in deps); print(agentica.__version__, agentica.__file__, Image.__module__)"
          pip uninstall -y agentica

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short