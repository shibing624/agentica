site_name: Agentica
site_description: A lightweight, powerful Python framework for building autonomous AI agents
site_url: https://shibing624.github.io/agentica
repo_url: https://github.com/shibing624/agentica
repo_name: shibing624/agentica

theme:
  name: readthedocs
  locale: zh
  highlightjs: true
  hljs_languages:
    - python
    - bash
    - yaml
    - json
    - shell
    - markdown
  navigation_depth: 3
  collapse_navigation: false
  titles_only: false
  sticky_navigation: true
  prev_next_buttons_location: bottom
  include_homepage_in_sidebar: true
  favicon: assets/favicon.png

nav:
  - Home: index.md
  - Introduction:
      - What is Agentica: introduction/what-is-agentica.md
      - Architecture Overview: introduction/architecture.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - CLI Terminal: getting-started/terminal.md
  - Core Concepts:
      - Agent: concepts/agent.md
      - Model: concepts/model.md
      - Tools: concepts/tools.md
      - Memory & Workspace: concepts/memory.md
      - Knowledge (RAG): concepts/rag.md
  - Multi-Agent:
      - Workflow: multi-agent/workflow.md
      - Swarm: multi-agent/swarm.md
      - Subagent: multi-agent/subagent.md
  - Advanced:
      - Hooks: advanced/hooks.md
      - RunConfig: advanced/run-config.md
      - Guardrails: advanced/guardrails.md
      - Context Compression: advanced/compression.md
      - Skills System: advanced/skills.md
      - MCP Integration: advanced/mcp.md
      - ACP Integration: advanced/acp.md
      - Gateway (IM Bots & HTTP): advanced/gateway.md
  - Model Providers: guides/models.md
  - Best Practices: guides/best_practices.md
  - API Reference:
      - Agent: api/agent.md
  - Benchmark: guides/benchmark.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
